<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IoT Relay Control</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<style>
/* ============ ROOT & THEME ============ */
:root {
  --bg-deep:    #060d1a;
  --bg-panel:   #0a1628;
  --bg-card:    #0f1f3a;
  --bg-card2:   #112340;
  --accent:     #00e5ff;
  --accent2:    #00b4d8;
  --green:      #39ff14;
  --red:        #ff3860;
  --amber:      #ffb300;
  --text:       #e0f4ff;
  --text-dim:   #7ab0cc;
  --border:     rgba(0,229,255,0.15);
  --glow:       0 0 20px rgba(0,229,255,0.3);
  --glow-green: 0 0 20px rgba(57,255,20,0.4);
  --glow-red:   0 0 20px rgba(255,56,96,0.4);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Rajdhani', sans-serif;
  background: var(--bg-deep);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  background-image:
    radial-gradient(ellipse at 10% 20%, rgba(0,180,216,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 90% 80%, rgba(0,229,255,0.04) 0%, transparent 50%);
}

/* Grid background */
body::before {
  content:'';
  position:fixed; inset:0; z-index:0; pointer-events:none;
  background-image:
    linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
}

/* ============ LOGIN PAGE ============ */
#loginPage {
  position:fixed; inset:0; z-index:100;
  display:flex; align-items:center; justify-content:center;
  background: var(--bg-deep);
  background-image: radial-gradient(ellipse at center, rgba(0,180,216,0.1) 0%, transparent 70%);
}

.login-box {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 48px 40px;
  width: 100%; max-width: 420px;
  position:relative; overflow:hidden;
  box-shadow: 0 0 60px rgba(0,229,255,0.1), inset 0 1px 0 rgba(255,255,255,0.05);
}

.login-box::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}

.login-logo {
  text-align:center; margin-bottom:36px;
}

.login-logo .icon-wrap {
  width:72px; height:72px; margin:0 auto 16px;
  background: linear-gradient(135deg, rgba(0,229,255,0.15), rgba(0,180,216,0.05));
  border: 1px solid rgba(0,229,255,0.3);
  border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  box-shadow: var(--glow);
}

.login-logo .icon-wrap svg { width:36px; height:36px; }

.login-logo h1 {
  font-family:'Orbitron', monospace;
  font-size:22px; font-weight:900;
  color: var(--accent);
  text-shadow: 0 0 20px rgba(0,229,255,0.5);
  letter-spacing:3px;
}

.login-logo p { color: var(--text-dim); font-size:13px; letter-spacing:1px; margin-top:4px; }

.form-group { margin-bottom:20px; }

.form-group label {
  display:block; font-size:12px; font-weight:600;
  color: var(--text-dim); letter-spacing:2px;
  text-transform:uppercase; margin-bottom:8px;
}

.form-group input {
  width:100%; padding:14px 18px;
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border);
  border-radius:8px; outline:none;
  color: var(--text); font-family:'Rajdhani',sans-serif; font-size:16px;
  transition: all 0.3s;
}

.form-group input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(0,229,255,0.1);
}

.btn-login {
  width:100%; padding:16px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border:none; border-radius:8px; cursor:pointer;
  font-family:'Orbitron',monospace; font-size:14px; font-weight:700;
  color: var(--bg-deep); letter-spacing:3px;
  transition: all 0.3s; text-transform:uppercase;
}

.btn-login:hover { box-shadow: var(--glow); transform:translateY(-1px); }
.btn-login:active { transform:translateY(0); }

.login-error {
  background: rgba(255,56,96,0.1);
  border: 1px solid rgba(255,56,96,0.3);
  border-radius:8px; padding:12px 16px;
  color: var(--red); font-size:14px;
  margin-top:16px; display:none; text-align:center;
}

/* ============ MAIN APP ============ */
#app { display:none; min-height:100vh; position:relative; z-index:1; }

/* Header */
header {
  background: rgba(10,22,40,0.95);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  position: sticky; top:0; z-index:50;
  display:flex; align-items:center; justify-content:space-between;
  height: 64px;
}

.header-brand {
  display:flex; align-items:center; gap:12px;
}

.header-brand .logo-icon {
  width:38px; height:38px;
  background: linear-gradient(135deg, rgba(0,229,255,0.2), rgba(0,180,216,0.05));
  border: 1px solid rgba(0,229,255,0.4);
  border-radius:10px;
  display:flex; align-items:center; justify-content:center;
}

.header-brand h1 {
  font-family:'Orbitron',monospace;
  font-size:16px; font-weight:900;
  color: var(--accent); letter-spacing:3px;
}

.header-right { display:flex; align-items:center; gap:16px; }

.status-badge {
  display:flex; align-items:center; gap:8px;
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border);
  border-radius:20px; padding:6px 14px;
  font-size:12px; font-weight:600; letter-spacing:1px;
}

.status-dot {
  width:8px; height:8px; border-radius:50%;
  background: var(--red);
  box-shadow: 0 0 8px var(--red);
  transition: all 0.5s;
}
.status-dot.online { background: var(--green); box-shadow: 0 0 8px var(--green); animation: pulse-dot 2s infinite; }

@keyframes pulse-dot {
  0%,100% { opacity:1; } 50% { opacity:0.5; }
}

.btn-logout {
  padding:8px 18px;
  background:transparent;
  border: 1px solid rgba(255,56,96,0.4);
  border-radius:8px; cursor:pointer;
  color: var(--red); font-family:'Rajdhani',sans-serif;
  font-size:13px; font-weight:600; letter-spacing:1px;
  transition: all 0.3s;
}
.btn-logout:hover { background:rgba(255,56,96,0.1); border-color:var(--red); }

/* Main content */
main { padding:24px; max-width:1200px; margin:0 auto; }

/* Clock bar */
.clock-bar {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius:12px; padding:16px 24px;
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:24px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.3);
}

.clock-time {
  font-family:'Orbitron',monospace;
  font-size:32px; font-weight:900;
  color: var(--accent);
  text-shadow: 0 0 30px rgba(0,229,255,0.5);
  letter-spacing:4px;
}

.clock-date {
  font-size:14px; color: var(--text-dim);
  letter-spacing:2px; text-align:right;
}

.clock-date .date-line { font-size:18px; color:var(--text); font-weight:600; }

/* Device info */
.device-info {
  display:flex; gap:12px; align-items:center;
}

.info-chip {
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border);
  border-radius:6px; padding:4px 12px;
  font-size:12px; color:var(--text-dim); letter-spacing:1px;
}

.info-chip span { color:var(--accent); }

/* Section title */
.section-title {
  font-family:'Orbitron',monospace;
  font-size:11px; font-weight:700;
  color:var(--text-dim); letter-spacing:4px;
  text-transform:uppercase; margin-bottom:16px;
  display:flex; align-items:center; gap:12px;
}

.section-title::after {
  content:''; flex:1; height:1px;
  background: linear-gradient(90deg, var(--border), transparent);
}

/* Relay Grid */
.relay-grid {
  display:grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap:20px; margin-bottom:32px;
}

/* Relay Card */
.relay-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius:16px; overflow:hidden;
  transition: all 0.3s;
  position:relative;
}

.relay-card::before {
  content:''; position:absolute;
  top:0; left:0; right:0; height:3px;
  background: linear-gradient(90deg, var(--accent2), var(--accent));
  opacity:0; transition:opacity 0.3s;
}

.relay-card.active { border-color: rgba(57,255,20,0.3); }
.relay-card.active::before { opacity:1; background:linear-gradient(90deg,#1de900,var(--green)); }

.relay-card:hover { transform:translateY(-2px); box-shadow: 0 12px 40px rgba(0,0,0,0.4); }

.relay-header {
  padding:20px 20px 16px;
  display:flex; align-items:center; justify-content:space-between;
}

.relay-icon {
  width:48px; height:48px;
  background: rgba(0,0,0,0.3);
  border: 1px solid var(--border);
  border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  transition: all 0.3s;
}

.relay-card.active .relay-icon {
  border-color: rgba(57,255,20,0.4);
  background: rgba(57,255,20,0.08);
  box-shadow: var(--glow-green);
}

.relay-icon svg { width:24px; height:24px; color:var(--text-dim); transition:all 0.3s; }
.relay-card.active .relay-icon svg { color:var(--green); }

.relay-info { flex:1; margin-left:16px; }

.relay-name {
  font-size:17px; font-weight:700; color:var(--text);
  margin-bottom:4px;
}

.relay-status {
  font-size:12px; letter-spacing:2px; font-weight:600;
  color:var(--red); text-transform:uppercase;
  transition:color 0.3s;
}

.relay-card.active .relay-status { color:var(--green); }

/* Toggle Switch */
.toggle-wrap {
  display:flex; align-items:center;
}

.toggle {
  position:relative; width:60px; height:30px; cursor:pointer;
}

.toggle input { opacity:0; width:0; height:0; }

.toggle-track {
  position:absolute; inset:0;
  background: rgba(255,56,96,0.2);
  border: 1px solid rgba(255,56,96,0.4);
  border-radius:30px;
  transition: all 0.4s;
  overflow:hidden;
}

.toggle-track::before {
  content:''; position:absolute;
  top:3px; left:3px;
  width:22px; height:22px;
  background: var(--red); border-radius:50%;
  transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
  box-shadow: 0 0 10px rgba(255,56,96,0.5);
}

.toggle input:checked ~ .toggle-track {
  background: rgba(57,255,20,0.2);
  border-color: rgba(57,255,20,0.5);
}

.toggle input:checked ~ .toggle-track::before {
  transform: translateX(30px);
  background: var(--green);
  box-shadow: 0 0 12px rgba(57,255,20,0.6);
}

/* Schedule Section */
.schedule-section {
  padding:0 20px 20px;
  border-top: 1px solid var(--border);
  margin-top:0;
}

.schedule-toggle-btn {
  width:100%;
  padding:12px 20px;
  background:transparent; border:none; cursor:pointer;
  color:var(--text-dim); font-family:'Rajdhani',sans-serif;
  font-size:13px; font-weight:600; letter-spacing:2px;
  display:flex; align-items:center; justify-content:space-between;
  transition:color 0.3s;
  margin:0 -20px; width:calc(100% + 0px);
}

.schedule-toggle-btn:hover { color:var(--accent); }

.schedule-toggle-btn .arrow {
  width:20px; height:20px; transition:transform 0.3s;
  display:flex; align-items:center; justify-content:center;
}

.schedule-toggle-btn.open .arrow { transform:rotate(180deg); }

.schedule-body {
  display:none; padding-top:16px;
}

.schedule-body.open { display:block; }

.schedule-row {
  display:flex; align-items:center; gap:12px; margin-bottom:12px;
}

.schedule-label {
  font-size:12px; letter-spacing:1px; color:var(--text-dim);
  min-width:40px;
}

.time-input {
  background: rgba(0,0,0,0.4);
  border: 1px solid var(--border);
  border-radius:8px; padding:8px 12px;
  color:var(--text); font-family:'Orbitron',monospace;
  font-size:14px; width:110px; outline:none;
  transition:border-color 0.3s;
}

.time-input:focus { border-color:var(--accent); }

.time-sep { color:var(--text-dim); font-size:18px; }

/* Days checkboxes */
.days-row {
  display:flex; gap:6px; margin-bottom:14px;
}

.day-btn {
  flex:1; padding:6px 2px;
  background:rgba(0,0,0,0.3);
  border:1px solid var(--border);
  border-radius:6px; cursor:pointer;
  color:var(--text-dim); font-size:11px;
  font-weight:600; letter-spacing:1px;
  text-align:center; transition:all 0.2s;
  user-select:none;
}

.day-btn.selected {
  background:rgba(0,229,255,0.15);
  border-color:rgba(0,229,255,0.4);
  color:var(--accent);
}

.schedule-enable {
  display:flex; align-items:center; gap:10px; margin-bottom:14px;
}

.schedule-enable label {
  font-size:12px; color:var(--text-dim); letter-spacing:1px;
  cursor:pointer;
}

.btn-save-schedule {
  width:100%; padding:10px;
  background: linear-gradient(135deg, rgba(0,229,255,0.15), rgba(0,180,216,0.05));
  border: 1px solid rgba(0,229,255,0.3);
  border-radius:8px; cursor:pointer;
  color:var(--accent); font-family:'Rajdhani',sans-serif;
  font-size:13px; font-weight:700; letter-spacing:2px;
  transition:all 0.3s;
}

.btn-save-schedule:hover {
  background: rgba(0,229,255,0.2);
  box-shadow: var(--glow);
}

/* Toast */
.toast {
  position:fixed; bottom:24px; right:24px; z-index:200;
  background:var(--bg-card2);
  border:1px solid var(--border);
  border-radius:10px; padding:14px 20px;
  display:flex; align-items:center; gap:12px;
  font-size:14px; font-weight:600;
  transform:translateX(120%); transition:transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  min-width:240px;
}

.toast.show { transform:translateX(0); }
.toast.success { border-color:rgba(57,255,20,0.3); color:var(--green); }
.toast.error { border-color:rgba(255,56,96,0.3); color:var(--red); }

/* Responsive */
@media(max-width:600px) {
  .clock-time { font-size:24px; }
  .clock-bar { flex-direction:column; gap:12px; text-align:center; }
  .header-brand h1 { font-size:13px; }
  .relay-grid { grid-template-columns:1fr; }
  main { padding:16px; }
}

/* Checkbox custom */
input[type=checkbox].sch-enable {
  width:18px; height:18px; accent-color:var(--accent); cursor:pointer;
}

/* Loading spinner */
.spinner {
  display:inline-block; width:16px; height:16px;
  border:2px solid rgba(0,229,255,0.2);
  border-top-color:var(--accent);
  border-radius:50%; animation:spin 0.8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }

/* Relay number badge */
.relay-num {
  position:absolute; top:12px; right:12px;
  font-family:'Orbitron',monospace; font-size:10px;
  color:var(--text-dim); letter-spacing:2px;
  opacity:0.5;
}
</style>
</head>
<body>

<!-- ====== LOGIN PAGE ====== -->
<div id="loginPage">
  <div class="login-box">
    <div class="login-logo">
      <div class="icon-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="#00e5ff" stroke-width="1.5">
          <path d="M13 10V3L4 14h7v7l9-11h-7z"/>
        </svg>
      </div>
      <h1>RELAY CTRL</h1>
      <p>IoT CONTROL PANEL</p>
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="emailInput" placeholder="user@example.com" autocomplete="email">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="passwordInput" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button class="btn-login" id="loginBtn" onclick="login()">SIGN IN</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ====== MAIN APP ====== -->
<div id="app">
  <header>
    <div class="header-brand">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#00e5ff" stroke-width="1.5">
          <path d="M13 10V3L4 14h7v7l9-11h-7z"/>
        </svg>
      </div>
      <h1>RELAY CTRL</h1>
    </div>
    <div class="header-right">
      <div class="status-badge">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">OFFLINE</span>
      </div>
      <button class="btn-logout" onclick="logout()">LOGOUT</button>
    </div>
  </header>

  <main>
    <!-- Clock Bar -->
    <div class="clock-bar">
      <div>
        <div class="clock-time" id="clockTime">--:--:--</div>
        <div style="color:var(--text-dim);font-size:12px;letter-spacing:2px;margin-top:4px">LOCAL TIME</div>
      </div>
      <div style="text-align:center">
        <div class="device-info">
          <div class="info-chip">IP: <span id="deviceIP">-</span></div>
          <div class="info-chip">ESP: <span id="deviceTime">--:--</span></div>
        </div>
      </div>
      <div class="clock-date">
        <div class="date-line" id="clockDate">-- --- ----</div>
        <div id="clockDay" style="letter-spacing:2px;font-size:12px;margin-top:4px">---</div>
      </div>
    </div>

    <!-- Relay Grid -->
    <div class="section-title">RELAY CHANNELS</div>
    <div class="relay-grid" id="relayGrid">
      <!-- Generated by JS -->
    </div>
  </main>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>

const RELAY_NAMES = ["Relay 1", "Relay 2", "Relay 3", "Relay 4"];
const RELAY_ICONS = [

  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>`,
  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>`,

];

const DAYS = ['SUN','MON','TUE','WED','THU','FRI','SAT'];

let relayStates = [false,false,false,false];
let scheduleData = Array(4).fill(null).map(() => ({
  enabled:false, onHour:8, onMin:0, offHour:20, offMin:0,
  days:[true,true,true,true,true,true,true]
}));
let scheduleOpenState = [false,false,false,false];
let firebaseListeners = [];

// ============ CLOCK ============
function updateClock() {
  const now = new Date();
  const h = String(now.getHours()).padStart(2,'0');
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clockTime').textContent = `${h}:${m}:${s}`;

  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  document.getElementById('clockDate').textContent =
    `${String(now.getDate()).padStart(2,'0')} ${months[now.getMonth()]} ${now.getFullYear()}`;
  document.getElementById('clockDay').textContent = dayNames[now.getDay()].toUpperCase();
}
setInterval(updateClock, 1000);
updateClock();

// ============ AUTH ============
auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initApp();
  } else {
    document.getElementById('loginPage').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    clearListeners();
  }
});

async function login() {
  const email = document.getElementById('emailInput').value.trim();
  const pass  = document.getElementById('passwordInput').value;
  const err   = document.getElementById('loginError');
  const btn   = document.getElementById('loginBtn');
  
  if (!email || !pass) {
    showLoginError('กรุณากรอก Email และ Password');
    return;
  }
  
  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled = true;
  err.style.display = 'none';
  
  try {
    await auth.signInWithEmailAndPassword(email, pass);
  } catch(e) {
    let msg = 'เข้าสู่ระบบไม่สำเร็จ';
    if (e.code === 'auth/user-not-found') msg = 'ไม่พบบัญชีนี้';
    else if (e.code === 'auth/wrong-password') msg = 'รหัสผ่านไม่ถูกต้อง';
    else if (e.code === 'auth/invalid-email') msg = 'Email ไม่ถูกต้อง';
    else if (e.code === 'auth/too-many-requests') msg = 'ลองใหม่ภายหลัง (บัญชีถูกล็อคชั่วคราว)';
    showLoginError(msg);
    btn.innerHTML = 'SIGN IN';
    btn.disabled = false;
  }
}

function showLoginError(msg) {
  const err = document.getElementById('loginError');
  err.textContent = msg;
  err.style.display = 'block';
}

async function logout() {
  await auth.signOut();
  showToast('ออกจากระบบแล้ว', 'success');
}

// Press Enter to login
document.getElementById('passwordInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') login();
});

// ============ APP INIT ============
function initApp() {
  renderRelayGrid();
  listenFirebase();
}

function clearListeners() {
  firebaseListeners.forEach(ref => ref.off());
  firebaseListeners = [];
}

// ============ RENDER GRID ============
function renderRelayGrid() {
  const grid = document.getElementById('relayGrid');
  grid.innerHTML = RELAY_NAMES.map((name, i) => `
    <div class="relay-card" id="card-${i}">
      <div class="relay-num">CH${i+1}</div>
      <div class="relay-header">
        <div class="relay-icon" id="icon-${i}">${RELAY_ICONS[i]}</div>
        <div class="relay-info">
          <div class="relay-name" contenteditable="true" id="rname-${i}">${name}</div>
          <div class="relay-status" id="status-${i}">OFFLINE</div>
        </div>
        <div class="toggle-wrap">
          <label class="toggle">
            <input type="checkbox" id="toggle-${i}" onchange="toggleRelay(${i}, this.checked)">
            <div class="toggle-track"></div>
          </label>
        </div>
      </div>
      
      <div class="schedule-section">
        <button class="schedule-toggle-btn" id="schbtn-${i}" onclick="toggleSchedule(${i})">
          <span>⏰ SCHEDULE</span>
          <span class="arrow">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </span>
        </button>
        
        <div class="schedule-body" id="schbody-${i}">
          <div class="schedule-enable">
            <input type="checkbox" class="sch-enable" id="sch-en-${i}">
            <label for="sch-en-${i}">เปิดใช้ตั้งเวลา</label>
          </div>
          
          <div style="font-size:11px;color:var(--text-dim);letter-spacing:2px;margin-bottom:8px">DAYS</div>
          <div class="days-row" id="days-${i}">
            ${DAYS.map((d,di) => `
              <div class="day-btn selected" data-relay="${i}" data-day="${di}" onclick="toggleDay(this,${i},${di})">${d}</div>
            `).join('')}
          </div>
          
          <div class="schedule-row">
            <div class="schedule-label" style="color:var(--green)">ON</div>
            <input type="time" class="time-input" id="on-${i}" value="08:00">
          </div>
          <div class="schedule-row">
            <div class="schedule-label" style="color:var(--red)">OFF</div>
            <input type="time" class="time-input" id="off-${i}" value="20:00">
          </div>
          
          <button class="btn-save-schedule" onclick="saveSchedule(${i})">💾 SAVE SCHEDULE</button>
        </div>
      </div>
    </div>
  `).join('');
}

// ============ FIREBASE LISTENER ============
function listenFirebase() {
  const relaysRef = db.ref('/relays');
  
  const stateListener = relaysRef.on('value', snap => {
    if (!snap.exists()) return;
    const data = snap.val();
    
    for (let i = 0; i < 4; i++) {
      const key = `relay${i+1}`;
      if (!data[key]) continue;
      
      // Update relay state
      const state = data[key].state === true || data[key].state === 1;
      updateRelayUI(i, state);
      
      // Update schedule UI
      if (data[key].schedule) {
        const sch = data[key].schedule;
        scheduleData[i] = sch;
        document.getElementById(`sch-en-${i}`).checked = sch.enabled || false;
        if (sch.onHour !== undefined) {
          document.getElementById(`on-${i}`).value =
            `${String(sch.onHour).padStart(2,'0')}:${String(sch.onMin).padStart(2,'0')}`;
        }
        if (sch.offHour !== undefined) {
          document.getElementById(`off-${i}`).value =
            `${String(sch.offHour).padStart(2,'0')}:${String(sch.offMin).padStart(2,'0')}`;
        }
        if (sch.days) {
          const dayBtns = document.querySelectorAll(`#days-${i} .day-btn`);
          dayBtns.forEach((btn, di) => {
            if (sch.days[di]) btn.classList.add('selected');
            else btn.classList.remove('selected');
          });
        }
      }
    }
  });

  // Device status
  const deviceRef = db.ref('/device');
  const deviceListener = deviceRef.on('value', snap => {
    if (!snap.exists()) return;
    const d = snap.val();
    const dot = document.getElementById('statusDot');
    const txt = document.getElementById('statusText');
    
    if (d.online) {
      dot.classList.add('online');
      txt.textContent = 'ONLINE';
    } else {
      dot.classList.remove('online');
      txt.textContent = 'OFFLINE';
    }
    
    if (d.ip) document.getElementById('deviceIP').textContent = d.ip;
    if (d.currentTime) {
      const t = d.currentTime.split(' ')[1] || d.currentTime;
      document.getElementById('deviceTime').textContent = t.substring(0,5);
    }
  });

  firebaseListeners.push({ off: () => relaysRef.off('value', stateListener) });
  firebaseListeners.push({ off: () => deviceRef.off('value', deviceListener) });
}

// ============ RELAY CONTROL ============
function updateRelayUI(index, state) {
  relayStates[index] = state;
  const card   = document.getElementById(`card-${index}`);
  const toggle = document.getElementById(`toggle-${index}`);
  const status = document.getElementById(`status-${index}`);
  
  card.classList.toggle('active', state);
  toggle.checked = state;
  status.textContent = state ? 'ONLINE · ON' : 'ONLINE · OFF';
}

async function toggleRelay(index, state) {
  try {
    await db.ref(`/relays/relay${index+1}/state`).set(state);
    showToast(`Relay ${index+1} ${state ? 'เปิด' : 'ปิด'} แล้ว`, 'success');
  } catch(e) {
    showToast('ไม่สามารถเชื่อมต่อได้', 'error');
    // Revert UI
    document.getElementById(`toggle-${index}`).checked = !state;
  }
}

// ============ SCHEDULE ============
function toggleSchedule(index) {
  scheduleOpenState[index] = !scheduleOpenState[index];
  const body = document.getElementById(`schbody-${index}`);
  const btn  = document.getElementById(`schbtn-${index}`);
  body.classList.toggle('open', scheduleOpenState[index]);
  btn.classList.toggle('open', scheduleOpenState[index]);
}

function toggleDay(el, relayIdx, dayIdx) {
  el.classList.toggle('selected');
}

async function saveSchedule(index) {
  const enabled = document.getElementById(`sch-en-${index}`).checked;
  const onVal   = document.getElementById(`on-${index}`).value.split(':');
  const offVal  = document.getElementById(`off-${index}`).value.split(':');
  
  const dayBtns = document.querySelectorAll(`#days-${index} .day-btn`);
  const days = {};
  dayBtns.forEach((btn, di) => {
    days[di] = btn.classList.contains('selected');
  });

  const schedule = {
    enabled,
    onHour:  parseInt(onVal[0]),
    onMin:   parseInt(onVal[1]),
    offHour: parseInt(offVal[0]),
    offMin:  parseInt(offVal[1]),
    days
  };

  try {
    await db.ref(`/relays/relay${index+1}/schedule`).set(schedule);
    showToast(`บันทึกตั้งเวลา Relay ${index+1} แล้ว`, 'success');
  } catch(e) {
    showToast('บันทึกไม่สำเร็จ', 'error');
  }
}

// ============ TOAST ============
let toastTimer;
function showToast(msg, type='success') {
  const toast = document.getElementById('toast');
  toast.textContent = (type === 'success' ? '✓ ' : '✗ ') + msg;
  toast.className = `toast ${type} show`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
}
</script>
